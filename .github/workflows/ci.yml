name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore tests/MouseTrainer.Tests/MouseTrainer.Tests.csproj
      - name: Build
        run: dotnet build tests/MouseTrainer.Tests/MouseTrainer.Tests.csproj --no-restore
      - name: Test
        run: dotnet test tests/MouseTrainer.Tests/MouseTrainer.Tests.csproj --no-build --verbosity normal
